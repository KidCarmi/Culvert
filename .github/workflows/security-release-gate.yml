## ─────────────────────────────────────────────────────────────────────────────
## ProxyShield — Security Release Gate
## ─────────────────────────────────────────────────────────────────────────────
## This workflow is the mandatory security gate that must pass before any
## release is published.  It runs automatically on:
##   • Push of a version tag (v*)   → blocks release if any check fails
##   • Pull requests to main/master → enforces the gate on every merge
##   • Manual trigger               → allows ad-hoc scanning (nightly, etc.)
##
## How the gate fits into the release flow:
##   1. Developer pushes tag:  git tag v1.2.3 && git push origin v1.2.3
##   2. This workflow runs ALL checks below in parallel where possible.
##   3. The "release-approved" job only runs if EVERY check passes.
##   4. The main ci.yml "release" job depends on "release-approved" as a
##      required status check (enforce via Branch Protection rules).
## ─────────────────────────────────────────────────────────────────────────────

name: Security Release Gate

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:  # disabled — re-enable when tokens are configured

# Prevent two concurrent scans on the same ref — cancel the older one.
concurrency:
  group: security-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. SAST — gosec ───────────────────────────────────────────────────────
  sast-gosec:
    name: "SAST · gosec"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run gosec
        uses: securego/gosec@master
        with:
          # Keep exclusions in sync with ci.yml — documented reasons in ci.yml.
          args: >-
            -exclude=G104,G302,G304,G401,G402,G704
            -fmt=sarif
            -out=gosec-results.sarif
            ./...

      - name: Upload SARIF to GitHub Security tab
        if: always()
        continue-on-error: true   # requires GitHub Advanced Security; skip gracefully if unavailable
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec-results.sarif
          category: gosec

  # ─── 2. Known CVEs — govulncheck ───────────────────────────────────────────
  vuln-govulncheck:
    name: "CVE · govulncheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Tidy modules
        run: go mod tidy

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Check for known Go vulnerabilities
        # govulncheck exits non-zero if any reachable code has a known CVE.
        run: govulncheck ./...

  # ─── 3. Dependency audit — trivy filesystem ────────────────────────────────
  vuln-trivy-fs:
    name: "CVE · trivy (source)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Scan source & dependencies with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"      # fail the gate on CRITICAL/HIGH findings
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true   # requires GitHub Advanced Security; skip gracefully if unavailable
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ─── 4. Docker image scan — trivy ──────────────────────────────────────────
  vuln-trivy-image:
    name: "CVE · trivy (Docker image)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning (no push)
        run: docker build -t proxyshield:scan .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "proxyshield:scan"
          format: "sarif"
          output: "trivy-image.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy image SARIF
        if: always()
        continue-on-error: true   # requires GitHub Advanced Security; skip gracefully if unavailable
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ─── 5. Secret scanning — gitleaks ─────────────────────────────────────────
  secrets-gitleaks:
    name: "Secrets · gitleaks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history so gitleaks can scan all commits

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set GITLEAKS_LICENSE in repo secrets for team/org plans.

  # ─── 6. Dependency license check ───────────────────────────────────────────
  license-check:
    name: "Licenses · go-licenses"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Tidy modules
        run: go mod tidy

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: Check for disallowed licenses
        # Fail if any dependency uses GPL, AGPL, LGPL, or CPAL.
        run: |
          go-licenses check ./... \
            --disallowed_types=forbidden,restricted \
            --ignore=proxy 2>&1 | tee license-report.txt
          # Exit code from go-licenses is respected automatically.

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: license-report.txt
          retention-days: 30

  # ─── 7. Generate SBOM ──────────────────────────────────────────────────────
  sbom:
    name: "SBOM · syft"
    runs-on: ubuntu-latest
    # SBOM generation is informational — does not block the gate.
    # The artifact is attached to every release for supply-chain transparency.
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: "."
          format: "cyclonedx-json"
          artifact-name: "proxyshield-sbom.json"
          output-file: "proxyshield-sbom.json"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: proxyshield-sbom.json
          retention-days: 90

  # ─── 8. Static analysis — staticcheck ──────────────────────────────────────
  sast-staticcheck:
    name: "SAST · staticcheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Tidy modules
        run: go mod tidy

      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "2025.1"
          install-go: false

  # ─── 9. Race-condition & coverage tests ────────────────────────────────────
  tests-race:
    name: "Tests · race detector + coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Tidy modules
        run: go mod tidy

      - name: Run tests with race detector
        run: go test -v -race -count=1 -coverprofile=coverage.out ./...

      - name: Check coverage threshold (≥ 60%)
        run: |
          total=$(go tool cover -func=coverage.out | grep ^total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${total}%"
          if (( $(echo "$total < 60" | bc -l) )); then
            echo "::error::Coverage ${total}% is below the 60% threshold"
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 30

  # ─── 10. Dockerfile linting — hadolint ──────────────────────────────────────
  lint-dockerfile:
    name: "Lint · Hadolint (Dockerfile)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          format: sarif
          output-file: hadolint.sarif
          # DL3018: pin apk versions — acceptable in build stage; GeoIP download is version-pinned via URL
          # DL3008: pin apt versions — not applicable (alpine-only image)
          ignore: DL3018

      - name: Upload Hadolint SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: hadolint.sarif
          category: hadolint

  # ─── GATE: all checks must pass ─────────────────────────────────────────────
  release-approved:
    name: "✅ Security Gate — APPROVED"
    runs-on: ubuntu-latest
    needs:
      - sast-gosec
      - vuln-govulncheck
      - vuln-trivy-fs
      - vuln-trivy-image
      - secrets-gitleaks
      - license-check
      - sast-staticcheck
      - tests-race
      - lint-dockerfile
    # sbom is informational — not in needs (non-blocking)
    steps:
      - name: Gate passed
        run: |
          echo "=================================================="
          echo "  All security checks passed — release approved"
          echo "  Ref:    ${{ github.ref }}"
          echo "  SHA:    ${{ github.sha }}"
          echo "  Actor:  ${{ github.actor }}"
          echo "  Time:   $(date -u)"
          echo "=================================================="

      - name: Create gate summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## ✅ Security Gate Passed

          | Check | Status |
          |-------|--------|
          | SAST (gosec) | ✅ |
          | CVE scan (govulncheck) | ✅ |
          | CVE scan (trivy source) | ✅ |
          | CVE scan (trivy image) | ✅ |
          | Secret scan (gitleaks) | ✅ |
          | License audit | ✅ |
          | Static analysis (staticcheck) | ✅ |
          | Tests (race detector + coverage) | ✅ |
          | Dockerfile lint (hadolint) | ✅ |

          **SBOM** attached as artifact (`proxyshield-sbom.json`).
          EOF
