name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      # gosec, staticcheck, tests, and fuzz are run by the Security Release
      # Gate workflow. This job only verifies compilation.
      - name: Build
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o culvert .

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: culvert-linux-amd64
          path: culvert
          retention-days: 7

  dependency-obituary:
    name: Dependency Obituary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: KidCarmi/Dependency-Obituary@main
        with:
          threshold: "60"

  docker:
    name: Docker Build & Publish
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write      # push to ghcr.io
      id-token: write      # cosign keyless image signing

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # ── Registry login ────────────────────────────────────────────────────
      # ghcr.io: always available, uses GITHUB_TOKEN — no secrets needed.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Image metadata ────────────────────────────────────────────────────
      # Generates tags and labels automatically:
      #   • version tags (v1.2.3 → 1.2.3, 1.2, 1, latest)
      #   • branch tags  (main → main)
      #   • PR tags      (pr-42)
      #   • SHA tag      (sha-abc1234)
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=Culvert
            org.opencontainers.image.description=Enterprise-grade HTTP/HTTPS/SOCKS5 forward proxy
            org.opencontainers.image.vendor=KidCarmi
            org.opencontainers.image.licenses=MIT

      # ── Multi-arch build & push ───────────────────────────────────────────
      - name: Set up QEMU (for ARM emulation)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          # Push only on main branch or version tags; PRs just build (no push).
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Embed provenance + SBOM attestations directly in the image manifest.
          provenance: true
          sbom: true

      # ── Sign the published image with cosign (keyless) ────────────────────
      # Only runs when the image was actually pushed (not PRs).
      - name: Install cosign
        if: ${{ github.event_name != 'pull_request' }}
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign image (keyless via Sigstore)
        if: ${{ github.event_name != 'pull_request' }}
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          # Sign every tag that was pushed.
          echo "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            cosign sign --yes \
              --rekor-url=https://rekor.sigstore.dev \
              "${tag}@${{ steps.build.outputs.digest }}"
          done

  release:
    name: Release
    runs-on: ubuntu-latest
    # Security gate must pass before any release binary is built or published.
    # The "release-approved" job lives in security-release-gate.yml and is
    # enforced as a required status check via Branch Protection rules.
    needs: [test, docker]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write
      id-token: write   # required for cosign keyless signing and SLSA provenance

    outputs:
      hashes: ${{ steps.collect-hashes.outputs.hashes }}

    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: .exe }

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o culvert-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }} .

      # Compute SHA-256 hash for SLSA provenance.
      - name: Compute binary hash
        id: hash
        run: |
          BINARY="culvert-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}"
          HASH=$(sha256sum "$BINARY" | base64 -w0)
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      # Install cosign for keyless signing via Sigstore OIDC (no secrets needed).
      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      # Sign the binary with cosign keyless signing.
      # The signature and certificate are stored in the Sigstore transparency log (Rekor).
      # Consumers can verify with: cosign verify-blob --certificate-identity-regexp 'github.com/...'
      - name: Sign binary with cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          BINARY="culvert-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}"
          cosign sign-blob \
            --yes \
            --output-certificate "${BINARY}.pem" \
            --output-signature  "${BINARY}.sig" \
            "${BINARY}"

      - name: Upload release asset + signature
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844 # v1
        with:
          files: |
            culvert-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}
            culvert-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}.sig
            culvert-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}.pem

      # Collect hashes across matrix legs for SLSA provenance.
      - name: Collect hashes for provenance
        id: collect-hashes
        run: echo "hashes=${{ steps.hash.outputs.hash }}" >> $GITHUB_OUTPUT

  # ─── SLSA provenance ──────────────────────────────────────────────────────
  # Generates SLSA Level 3 provenance for all release binaries, providing a
  # cryptographically verifiable record of what was built, when, and how.
  provenance:
    name: "Supply Chain · SLSA provenance"
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.release.outputs.hashes }}
      upload-assets: true
