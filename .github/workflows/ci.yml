name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Tidy and download dependencies
        run: go mod tidy && go mod download

      - name: Vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "2025.1"
          install-go: false

      - name: gosec
        uses: securego/gosec@master
        with:
          args: "-exclude=G104,G302,G304,G401,G402,G704 ./..."
        # G104: unhandled errors on network writes/copies — intentional for streaming proxy paths
        # G302: log file permissions — fixed to 0600; rule kept excluded for any residual hits
        # G304: file path from variable — acceptable for blocklist/config/policy loading
        # G401: MD5/SHA1 — we use SHA-256, gosec sometimes misidentifies
        # G402: TLSSkipVerify — documented dev/test option, guarded by config flag
        # G704: SSRF taint — a forward proxy must connect to arbitrary client-supplied hosts

      - name: Test
        run: go test -v -race -count=1 ./...

      - name: Build
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o proxyshield .

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: proxyshield-linux-amd64
          path: proxyshield
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: proxyshield:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Release
    runs-on: ubuntu-latest
    # Security gate must pass before any release binary is built or published.
    # The "release-approved" job lives in security-release-gate.yml and is
    # enforced as a required status check via Branch Protection rules.
    needs: [test, docker]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: .exe }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Tidy modules
        run: go mod tidy

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o proxyshield-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }} .

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: proxyshield-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}
