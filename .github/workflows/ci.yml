name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Tidy and download dependencies
        run: go mod tidy && go mod download

      - name: Vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "2025.1"
          install-go: false

      - name: gosec
        uses: securego/gosec@master
        with:
          args: "-exclude=G104,G302,G304,G401,G402,G704 ./..."
        # G104: unhandled errors on network writes/copies — intentional for streaming proxy paths
        # G302: log file permissions — fixed to 0600; rule kept excluded for any residual hits
        # G304: file path from variable — acceptable for blocklist/config/policy loading
        # G401: MD5/SHA1 — we use SHA-256, gosec sometimes misidentifies
        # G402: TLSSkipVerify — documented dev/test option, guarded by config flag
        # G704: SSRF taint — a forward proxy must connect to arbitrary client-supplied hosts

      - name: Fuzz (short regression run)
        # Run each fuzz target for 15 s — long enough to replay the seed corpus
        # and catch obvious regressions, short enough for CI to stay fast.
        run: |
          for target in \
            FuzzIsPrivateHost \
            FuzzIsSafeRedirectURL \
            FuzzParseClamResponse \
            FuzzNormaliseFeedURL \
            FuzzMatchDest \
            FuzzParseYARALiteral; do
            echo "── $target ──"
            go test -run='^$' -fuzz="$target" -fuzztime=15s .
          done

      - name: Test
        run: go test -v -race -count=1 -coverprofile=coverage.out ./...

      - name: Check coverage threshold (≥ 60%)
        run: |
          total=$(go tool cover -func=coverage.out | grep ^total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${total}%"
          if (( $(echo "$total < 60" | bc -l) )); then
            echo "::error::Coverage ${total}% is below the 60% threshold"
            exit 1
          fi

      - name: Build
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o proxyshield .

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: proxyshield-linux-amd64
          path: proxyshield
          retention-days: 7

  docker:
    name: Docker Build & Publish
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write      # push to ghcr.io
      id-token: write      # cosign keyless image signing

    steps:
      - uses: actions/checkout@v4

      # ── Registry login ────────────────────────────────────────────────────
      # ghcr.io: always available, uses GITHUB_TOKEN — no secrets needed.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub: only when the repo secret is configured.
      # Add DOCKERHUB_USERNAME + DOCKERHUB_TOKEN in repo Settings → Secrets.
      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Image metadata ────────────────────────────────────────────────────
      # Generates tags and labels automatically:
      #   • version tags (v1.2.3 → 1.2.3, 1.2, 1, latest)
      #   • branch tags  (main → main)
      #   • PR tags      (pr-42)
      #   • SHA tag      (sha-abc1234)
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/proxyshield', secrets.DOCKERHUB_USERNAME) || '' }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=ProxyShield
            org.opencontainers.image.description=Enterprise-grade HTTP/HTTPS/SOCKS5 forward proxy
            org.opencontainers.image.vendor=KidCarmi
            org.opencontainers.image.licenses=MIT

      # ── Multi-arch build & push ───────────────────────────────────────────
      - name: Set up QEMU (for ARM emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          # Push only on main branch or version tags; PRs just build (no push).
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Embed provenance + SBOM attestations directly in the image manifest.
          provenance: true
          sbom: true

      # ── Sign the published image with cosign (keyless) ────────────────────
      # Only runs when the image was actually pushed (not PRs).
      - name: Install cosign
        if: ${{ github.event_name != 'pull_request' }}
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless via Sigstore)
        if: ${{ github.event_name != 'pull_request' }}
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          # Sign every tag that was pushed.
          echo "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            cosign sign --yes \
              --rekor-url=https://rekor.sigstore.dev \
              "${tag}@${{ steps.build.outputs.digest }}"
          done

  release:
    name: Release
    runs-on: ubuntu-latest
    # Security gate must pass before any release binary is built or published.
    # The "release-approved" job lives in security-release-gate.yml and is
    # enforced as a required status check via Branch Protection rules.
    needs: [test, docker]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write
      id-token: write   # required for cosign keyless signing and SLSA provenance

    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: .exe }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Tidy modules
        run: go mod tidy

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o proxyshield-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }} .

      # Install cosign for keyless signing via Sigstore OIDC (no secrets needed).
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Sign the binary with cosign keyless signing.
      # The signature and certificate are stored in the Sigstore transparency log (Rekor).
      # Consumers can verify with: cosign verify-blob --certificate-identity-regexp 'github.com/...'
      - name: Sign binary with cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          BINARY="proxyshield-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}"
          cosign sign-blob \
            --yes \
            --output-certificate "${BINARY}.pem" \
            --output-signature  "${BINARY}.sig" \
            "${BINARY}"

      - name: Upload release asset + signature
        uses: softprops/action-gh-release@v1
        with:
          files: |
            proxyshield-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}
            proxyshield-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}.sig
            proxyshield-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}.pem

  # ─── SLSA provenance ──────────────────────────────────────────────────────
  # Generates SLSA Level 3 provenance for all release binaries, providing a
  # cryptographically verifiable record of what was built, when, and how.
  provenance:
    name: "Supply Chain · SLSA provenance"
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: |
        ${{ needs.release.outputs.hashes || '' }}
      upload-assets: true
