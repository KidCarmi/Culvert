version: "3.3"

services:
  proxy:
    build: .
    container_name: proxyshield
    restart: unless-stopped
    ports:
      - "8080:8080"   # Proxy
      - "9090:9090"   # Web UI (HTTPS)
    volumes:
      # - ./config.yaml:/app/config.yaml:ro   # optional — copy config.example.yaml → config.yaml first
      - proxy-data:/data
    environment:
      - TZ=UTC
    command: ["-port", "8080", "-ui-port", "9090", "-logfile", "/data/proxy.log"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  proxy-data:
