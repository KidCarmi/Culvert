# ProxyShield Configuration
# Copy to config.yaml and edit as needed.
# CLI flags always override values in this file.
#
# Usage:
#   ./proxyshield -config config.yaml
#   docker-compose up -d

proxy:
  port: 8080          # HTTP proxy port
  ui_port: 9090       # Web UI port (HTTPS, self-signed cert by default)
  socks5_port: 0      # SOCKS5 proxy port (0 = disabled, e.g. 1080)
  blocklist: ""       # Path to blocklist file (one host per line; *.example.com wildcards supported)
  log_file: ""        # Path to log file (empty = stdout only)
  log_max_mb: 50      # Rotate log when it reaches this size in MB
  tls_cert: ""        # Custom TLS certificate for Web UI (PEM, optional)
  tls_key: ""         # Custom TLS key for Web UI (PEM, optional)
  ca_path: "/data/ca.bundle"      # Persistent Root CA bundle (mount /data as Docker volume)
  ssl_bypass_file: "/data/ssl-bypass.json"  # Dynamic bypass list — managed via /api/ssl-bypass (no restart needed)
  ssl_bypass_patterns: []         # Initial bypass patterns — seeded into ssl_bypass_file on first run
    # Glob examples (bare domain also matches all subdomains — Palo Alto style):
    # - "*.co.il"
    # - "bank.example.com"        # matches bank.example.com AND *.bank.example.com
    # Regex examples (prefix with ~):
    # - "~^.*\\.gov\\.il$"
  content_scan_file: "/data/content-scan.json"  # DPI patterns — managed via /api/content-scan (no restart needed)
  content_scan_patterns: []      # Initial DPI regex patterns — seeded into content_scan_file on first run
    # Pattern examples (standard Go regex):
    # - "(?i)malware-signature"
    # - "eval\\(base64_decode"   # PHP webshell
    # - "\\b\\d{4}[- ]?\\d{4}[- ]?\\d{4}[- ]?\\d{4}\\b"  # CC-like numbers
  geoip_db: ""            # Path to MaxMind GeoLite2-Country.mmdb — enables destCountry policy rules
                          # and country traffic stats in the dashboard.
                          # Download free DB: https://dev.maxmind.com/geoip/geolite2-free-geolocation-data
                          # Example: "/data/GeoLite2-Country.mmdb"

auth:
  user: ""            # Basic-auth username (empty = auth disabled for HTTP proxy & SOCKS5)
  pass: ""

security:
  ip_filter_mode: ""  # IP filter mode: "" (off) | "allow" (allowlist) | "block" (blocklist)
  ip_list: []         # IPs or CIDRs governed by ip_filter_mode
    # - 192.168.1.0/24
    # - 10.0.0.5
  rate_limit: 0       # Max requests per minute per IP (0 = disabled)
