# ProxyShield Configuration
# Copy to config.yaml and edit as needed.
# CLI flags always override values in this file.
#
# Usage:
#   ./proxyshield -config config.yaml
#   docker-compose up -d

proxy:
  port: 8080          # HTTP proxy port
  ui_port: 9090       # Web UI port (HTTPS, self-signed cert by default)
  socks5_port: 0      # SOCKS5 proxy port (0 = disabled, e.g. 1080)
  blocklist: ""       # Path to blocklist file (one host per line; *.example.com wildcards supported)
  log_file: ""        # Path to log file (empty = stdout only)
  log_max_mb: 50      # Rotate log when it reaches this size in MB
  tls_cert: ""        # Custom TLS certificate for Web UI (PEM, optional)
  tls_key: ""         # Custom TLS key for Web UI (PEM, optional)
  ca_path: "/data/ca.bundle"  # Persistent Root CA bundle (mount /data as Docker volume to survive restarts)
  ssl_bypass_patterns: []     # Hosts that always bypass SSL inspection (glob or ~regex)
    # Glob examples (*.X matches subdomain and bare domain):
    # - "*.co.il"
    # - "*.bank.com"
    # Regex examples (prefix with ~):
    # - "~^.*\\.gov\\.il$"

auth:
  user: ""            # Basic-auth username (empty = auth disabled for HTTP proxy & SOCKS5)
  pass: ""

security:
  ip_filter_mode: ""  # IP filter mode: "" (off) | "allow" (allowlist) | "block" (blocklist)
  ip_list: []         # IPs or CIDRs governed by ip_filter_mode
    # - 192.168.1.0/24
    # - 10.0.0.5
  rate_limit: 0       # Max requests per minute per IP (0 = disabled)
